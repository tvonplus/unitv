<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ativador UniTV - Download</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111827;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: #1f2937;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,.5);
            max-width: 400px;
            width: 85%;
        }
        h1 { margin-top: 0; color: #3b82f6; font-size: 26px; }
        p { color: #d1d5db; font-size: 16px; margin-bottom: 10px; }
        .codigo-tv {
            font-size: 38px;
            font-weight: bold;
            color: #f59e0b;
            background: #111827;
            padding: 10px;
            border-radius: 8px;
            letter-spacing: 4px;
            margin: 15px 0;
            border: 2px dashed #f59e0b;
        }
        input[type="number"] {
            width: 80%;
            padding: 12px;
            font-size: 22px;
            text-align: center;
            border-radius: 8px;
            border: 2px solid #374151;
            background: #111827;
            color: #fff;
            margin-bottom: 15px;
        }
        button {
            background: #16a34a;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 90%;
        }
        button:hover { background: #15803d; }
        .erro { color: #ef4444; font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="box">
    <h1>UniTV Ativador</h1>
    <p>Informe o código abaixo ao suporte:</p>
    
    <!-- Código Aleatório do Aparelho -->
    <div class="codigo-tv" id="codigoAparelho">----</div>

    <p>Digite a senha de liberação enviada:</p>
    <input type="number" id="senhaLiberacao" placeholder="0000" maxlength="4">
    
    <button onclick="validarEBaixar()">📥 BAIXAR APK</button>
    <div class="erro" id="msgErro">Senha incorreta! Tente novamente.</div>
</div>

<script>
    // 1. Gera um código aleatório de 4 dígitos para este aparelho/sessão
    const codigoAparelho = Math.floor(1000 + Math.random() * 9000);
    document.getElementById('codigoAparelho').innerText = codigoAparelho;

    // Chave Secreta (NÃO MUDE A MENOS QUE MUDE NO GERAR.HTML TAMBÉM)
    const CHAVE_SECRETA = 3579;

    function validarEBaixar() {
        const entrada = document.getElementById('senhaLiberacao').value;
        const msgErro = document.getElementById('msgErro');

        // Cálculo da resposta esperada baseado no código do aparelho
        const respostaEsperada = (codigoAparelho * 3 + CHAVE_SECRETA) % 10000;
        
        // Garante 4 dígitos com zeros à esquerda se necessário
        const respostaFormatada = String(respostaEsperada).padStart(4, '0');

        if (entrada === respostaFormatada) {
            msgErro.style.display = 'none';
            
            // Cria um link temporário para iniciar o download do APK
            const link = document.createElement('a');
            link.href = 'Ativador%20Unitv.apk';
            link.download = 'Ativador Unitv.apk';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        } else {
            msgErro.style.display = 'block';
        }
    }
</script>

</body>
</html>
