<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Seguro</title>
    <style>
        /* Define a tela inteira e centraliza os elementos */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            font-family: Arial, sans-serif;
        }

        /* Container que guarda as informações */
        .container-informacoes {
            position: relative;
            /* Joga o quadrado mais para cima para o teclado não cobrir */
            transform: translateY(-15vh); 
            
            width: 90%;
            max-width: 400px;
            background: #ffffff;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        /* Ajuste extra para telas de celulares muito pequenos ou em modo paisagem */
        @media (max-height: 600px) {
            .container-informacoes {
                transform: translateY(-25vh);
            }
        }

        h3 {
            margin-top: 0;
            color: #333;
        }

        p {
            color: #666;
            margin-bottom: 20px;
        }

        /* Estilo do input de senha */
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        /* Estilo do botão */
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container-informacoes">
        <!-- O conteúdo desta div será trocado pelo JavaScript -->
        <div id="status-informacao">
            <h3>Área de Download</h3>
            <p>Digite a senha recebida para iniciar o download.</p>
            
            <form id="form-senha">
                <input type="password" id="input-senha" placeholder="Digite a senha..." required>
                <button type="submit">Liberar Arquivo</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('form-senha').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que a página recarregue ao enviar o formulário
            
            const senhaDigitada = document.getElementById('input-senha').value;
            const statusBox = document.getElementById('status-informacao'); 
            
            // Aqui você pode fazer a validação da senha. 
            // Exemplo: if(senhaDigitada !== "12345") { alert("Senha Incorreta"); return; }

            // 1. Muda a tela imediatamente para "Aguarde..."
            statusBox.innerHTML = `
                <div style="padding: 20px 0;">
                    <h3 style="color: #007bff;">Aguarde...</h3>
                    <p>Preparando seu arquivo para download de forma segura.</p>
                </div>
            `;

            // 2. Aguarda 2 segundos (2000 ms), inicia o download e atualiza o aviso
            setTimeout(() => {
                iniciarDownloadReal();
                
                // Mensagem final após o download iniciar
                statusBox.innerHTML = `
                    <div style="padding: 20px 0;">
                        <h3 style="color: #28a745;">Download Iniciado!</h3>
                        <p>Verifique a barra de downloads ou a galeria do seu dispositivo.</p>
                        <button onclick="location.reload()" style="margin-top: 15px;">Baixar Novamente</button>
                    </div>
                `;
            }, 2000); 
        });

        function iniciarDownloadReal() {
            // ATENÇÃO: Coloque o link direto do seu arquivo abaixo
            const link = document.createElement('a');
            link.href = 'URL_DO_SEU_ARQUIVO_AQUI'; 
            link.download = 'NomeDoSeuArquivo.zip'; // Nome que o arquivo terá ao ser baixado
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>

</body>
</html>
