<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: #1e293b;
            padding: 35px 25px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 380px;
            width: 90%;
            border: 1px solid #334155;
        }
        p { 
            color: #94a3b8; 
            font-size: 16px; 
            margin: 8px 0; 
        }
        .instrucao {
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 5px;
        }
        .codigo-tv {
            font-size: 42px;
            font-weight: bold;
            color: #38bdf8;
            background: #0f172a;
            padding: 12px;
            border-radius: 10px;
            letter-spacing: 6px;
            margin: 15px 0 25px 0;
            border: 2px dashed #0284c7;
        }
        .btn-abrir {
            background: #2563eb;
            color: white;
            border: none;
            padding: 16px 20px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            outline: none;
        }
        
        /* Destaque visual quando selecionado pelo controle da TV */
        .btn-abrir:focus, .btn-ok:focus, .btn-cancelar:focus, input:focus {
            outline: 3px solid #38bdf8 !important;
            box-shadow: 0 0 12px #38bdf8;
        }

        /* ESTILOS DO MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e293b;
            padding: 30px 20px;
            border-radius: 16px;
            width: 85%;
            max-width: 340px;
            text-align: center;
            border: 1px solid #475569;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .modal-content h3 {
            margin-top: 0;
            color: #f8fafc;
            font-size: 20px;
        }
        .modal-content input {
            width: 90%;
            padding: 14px;
            font-size: 24px;
            text-align: center;
            border-radius: 8px;
            border: 2px solid #475569;
            background: #0f172a;
            color: #fff;
            margin: 15px 0;
            outline: none;
        }
        .modal-botoes {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .btn-ok {
            background: #16a34a;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            outline: none;
        }
        .btn-cancelar {
            background: #475569;
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            outline: none;
        }
        .erro {
            color: #f87171;
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="box">
    <p class="instrucao">Informe o código abaixo ao suporte:</p>
    <div class="codigo-tv" id="codigoAparelho">----</div>

    <button class="btn-abrir" id="btnAbrir" onclick="abrirModal()">🔑 Digitar Senha</button>
</div>

<!-- MODAL PARA DIGITAR A SENHA -->
<div class="modal-overlay" id="modalSenha">
    <div class="modal-content">
        <h3>Informe a Senha</h3>
        <input type="number" id="senhaLiberacao" placeholder="0000" maxlength="4">
        
        <div class="modal-botoes">
            <button class="btn-ok" id="btnOk" onclick="validarEBaixar()">OK</button>
            <button class="btn-cancelar" id="btnCancelar" onclick="fecharModal()">Sair</button>
        </div>

        <div class="erro" id="msgErro">Senha incorreta! Tente novamente.</div>
    </div>
</div>

<script>
    // Gera o código aleatório do aparelho
    const codigoAparelho = Math.floor(1000 + Math.random() * 9000);
    document.getElementById('codigoAparelho').innerText = codigoAparelho;

    const CHAVE_SECRETA = 3579;

    // Foca automaticamente no botão principal ao carregar a página na TV
    window.onload = () => {
        document.getElementById('btnAbrir').focus();
    };

    function abrirModal() {
        const modal = document.getElementById('modalSenha');
        const inputSenha = document.getElementById('senhaLiberacao');
        
        modal.style.display = 'flex';
        inputSenha.value = '';
        document.getElementById('msgErro').style.display = 'none';

        // Garante o foco no input para abrir o teclado virtual da TV
        setTimeout(() => {
            inputSenha.focus();
        }, 150);
    }

    function fecharModal() {
        document.getElementById('modalSenha').style.display = 'none';
        document.getElementById('btnAbrir').focus();
    }

    function validarEBaixar() {
        const entrada = document.getElementById('senhaLiberacao').value;
        const msgErro = document.getElementById('msgErro');

        const respostaEsperada = (codigoAparelho * 3 + CHAVE_SECRETA) % 10000;
        const respostaFormatada = String(respostaEsperada).padStart(4, '0');

        if (entrada === respostaFormatada) {
            msgErro.style.display = 'none';
            fecharModal();
            
            // Inicia o download diretamente
            const link = document.createElement('a');
            link.href = 'Ativador%20Unitv.apk';
            link.download = 'Ativador Unitv.apk';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        } else {
            msgErro.style.display = 'block';
            // Devolve o foco ao campo de texto em caso de erro
            document.getElementById('senhaLiberacao').focus();
        }
    }

    // SUPORTE A NAVEGAÇÃO POR TECLAS DO CONTROLE REMOTO
    document.addEventListener('keydown', function(event) {
        const modalAberto = document.getElementById('modalSenha').style.display === 'flex';

        if (!modalAberto) return;

        const key = event.key;
        const activeEl = document.activeElement;

        // Se pressionar 'Voltar' ou 'Esc' no controle, fecha o modal
        if (key === 'Escape' || key === 'Back' || event.keyCode === 10009 || event.keyCode === 8) {
            fecharModal();
            event.preventDefault();
        }

        // Navegação por setas dentro do Modal
        if (key === 'ArrowDown') {
            if (activeEl.id === 'senhaLiberacao') {
                document.getElementById('btnOk').focus();
                event.preventDefault();
            }
        } else if (key === 'ArrowUp') {
            if (activeEl.id === 'btnOk' || activeEl.id === 'btnCancelar') {
                document.getElementById('senhaLiberacao').focus();
                event.preventDefault();
            }
        } else if (key === 'ArrowRight') {
            if (activeEl.id === 'btnOk') {
                document.getElementById('btnCancelar').focus();
                event.preventDefault();
            }
        } else if (key === 'ArrowLeft') {
            if (activeEl.id === 'btnCancelar') {
                document.getElementById('btnOk').focus();
                event.preventDefault();
            }
        } else if (key === 'Enter') {
            // Se estiver focado no campo de texto e apertar OK/Enter no controle, tenta validar
            if (activeEl.id === 'senhaLiberacao' && activeEl.value.length === 4) {
                validarEBaixar();
                event.preventDefault();
            }
        }
    });
</script>

</body>
</html>
